<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flipkart Reverse SP Engine</title>

<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="app-header">
  <div class="header-left">
    <img src="images/logo.png" alt="Logo" class="app-logo">
    <div class="title">Flipkart Reverse SP Engine</div>
  </div>
  <button id="exportBtn">Export CSV</button>
</header>

<div class="filter-bar">
  <input type="text" id="searchInput" placeholder="Search SKU / Partial SKU">
  <select id="categoryFilter">
    <option value="all">All Categories</option>
  </select>
</div>

<div class="summary-bar" id="summaryBar">
  Total: 0 | Safe: 0 | Avg SP: 0
</div>

<div class="table-container">
  <table class="pricing-table">
    <thead>
      <tr>
        <th>SKU</th>
        <th>Category</th>
        <th>TP</th>
        <th>SP</th>
        <th>Commission</th>
        <th>Collection</th>
        <th>Fixed Fee</th>
        <th>GST on Fees</th>
        <th>TDS</th>
        <th>TCS</th>
        <th>Bank Settlement</th>
        <th>Input GST Credit</th>
        <th>Income Tax Credit</th>
        <th>Effective Net</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<button id="loadMoreBtn" class="load-more">Load More</button>

<script type="module" src="js/app.js"></script>

</body>
</html>

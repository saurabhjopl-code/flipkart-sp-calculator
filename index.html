<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flipkart Reverse SP Engine</title>

<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="app-header">
  <div class="header-left">
    <img src="images/logo.png" alt="Logo" class="app-logo">
    <div class="title">Flipkart & Myntra Reverse SP Engine</div>
  </div>
  <button id="exportBtn">Export CSV</button>
</header>

<div class="filter-bar">
  <div style="position:relative;">
  <input type="text" id="searchInput" placeholder="Search SKU / Partial SKU">
  <span id="clearSearch" class="clear-btn">✕</span>
</div>

  <select id="categoryFilter">
    <option value="all">All Categories</option>
  </select>
</div>

<div class="summary-bar" id="summaryBar">
  Total: 0 | Safe: 0 | Avg SP: 0
</div>

<div class="marketplace-tabs">
  <button id="flipkartTab" class="tab-btn active">Flipkart</button>
  <button id="myntraTab" class="tab-btn">Myntra</button>
  <button id="calculatorTab" class="tab-btn">Calculator</button>
</div>
  
  <div id="calculatorSection" style="display:none; padding:25px; background:white; margin:20px;">
  
  <h3>Online Pricing Calculator</h3>

  <div style="display:flex; gap:15px; flex-wrap:wrap; margin-top:15px;">

    <select id="calcMP">
      <option value="FLIPKART">Flipkart</option>
      <option value="MYNTRA">Myntra</option>
    </select>

    <select id="calcCategory"></select>

    <select id="calcBrand" style="display:none;"></select>

    <input type="number" id="calcTP" placeholder="Enter TP" />

    <button id="calcBtn">Calculate</button>

  </div>

  <div id="calcResult" style="margin-top:20px; font-weight:600;"></div>

</div>
  
<div class="table-container">
  <table class="pricing-table">
    <thead>
      <tr>
        <th>SKU</th>
        <th>Category</th>
        <th>Brand</th>
        <th>TP</th>
        <th>SP</th>
        <th>GTA</th>
        <th>Commission</th>
        <th>Collection</th>
        <th>Fixed Fee</th>
        <th>GST on Fees</th>
        <th>TDS</th>
        <th>TCS</th>
        <th>Bank Settlement</th>
        <th>Input GST Credit</th>
        <th>Income Tax Credit</th>
        <th>Effective Net</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<button id="loadMoreBtn" class="load-more">Load More</button>

<script type="module" src="js/app.js"></script>

</body>
</html>

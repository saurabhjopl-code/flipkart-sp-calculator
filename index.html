<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flipkart Reverse SP Engine</title>

<!-- FIXED FAVICON PATH FOR GITHUB PROJECT REPO -->
<link rel="icon" type="image/png" sizes="32x32" href="favicon.png">

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="app-header">
  <div class="header-left">
    <img src="images/logo.png" alt="Logo" class="app-logo">
    <div class="title">Flipkart Reverse SP Engine</div>
  </div>
  <button id="exportBtn">Export CSV</button>
</header>

<div class="progress-container">
  <div id="progressBar"></div>
</div>
<div id="progressText" class="progress-text">Loading 0%</div>

<div class="filter-bar">
  <input type="text" id="searchInput" placeholder="Search SKU / Partial SKU">
  <select id="categoryFilter">
    <option value="all">All Categories</option>
  </select>
</div>

<div class="summary-bar" id="summaryBar">
  Total: 0 | Safe: 0 | Avg SP: 0
</div>

<div class="table-container">
  <table>
    <thead>
      <tr>
        <th>SKU</th>
        <th>Category</th>
        <th>TP</th>
        <th>Sim TP</th>
        <th>SP</th>
        <th>Settlement</th>
        <th>Δ SP</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<button id="loadMoreBtn" class="load-more">Load More</button>

<script src="js/app.js"></script>

</body>
</html>
